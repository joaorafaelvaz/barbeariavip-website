# Barbearia VIP - novosite.barbearia.vip
# This config only affects this domain. Other server blocks are untouched.
#
# Initial setup (HTTP only - run certbot after):
#   1. Copy to /etc/nginx/sites-available/novosite.barbearia.vip
#   2. Symlink to sites-enabled
#   3. nginx -t && systemctl reload nginx
#   4. certbot --nginx -d novosite.barbearia.vip
#   Certbot will automatically add the SSL block and redirect.

server {
    listen 80;
    listen [::]:80;
    server_name novosite.barbearia.vip;

    # Root - static files
    root /var/www/barbeariavip-website;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # Certbot challenge (required before SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/barbeariavip-website;
    }

    # Static files - frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin panel
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # API - proxy to FastAPI (port 8009)
    location /api/ {
        proxy_pass http://127.0.0.1:8009;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Upload limit (5MB for blog images)
        client_max_body_size 5M;
    }

    # Blog uploaded images
    location /img/blog/ {
        alias /var/www/barbeariavip-website/img/blog/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static assets cache
    location ~* \.(css|js|jpg|jpeg|png|webp|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Deny hidden files (.git, .env, .claude, etc)
    location ~ /\. {
        deny all;
    }

    # Deny api source files
    location ~ ^/api/.*\.(py|db|env)$ {
        deny all;
    }

    # Deny node_modules
    location /node_modules/ {
        deny all;
    }
}
