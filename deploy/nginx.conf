server {
    listen 80;
    server_name novosite.barbeariavip.com.br;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name novosite.barbeariavip.com.br;

    # SSL - Certbot will fill these
    ssl_certificate /etc/letsencrypt/live/novosite.barbeariavip.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/novosite.barbeariavip.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Root - static files
    root /var/www/barbeariavip-website;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # Static files - frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin panel
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # API - proxy to FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upload limit (5MB for blog images)
        client_max_body_size 5M;
    }

    # Blog uploaded images
    location /img/blog/ {
        alias /var/www/barbeariavip-website/img/blog/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static assets cache
    location ~* \.(css|js|jpg|jpeg|png|webp|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }

    # Deny api directory source files
    location ~ ^/api/.*\.(py|db|env)$ {
        deny all;
    }
}
